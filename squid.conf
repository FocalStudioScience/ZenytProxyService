# Zenyt Proxy Service - Squid Configuration
# This proxy provides a fixed IP address for outbound web requests

# Network settings
http_port 3128

# Access control - allow only private IP ranges (AWS VPCs, internal networks)
acl localnet src 10.0.0.0/8
acl localnet src 172.16.0.0/12
acl localnet src 192.168.0.0/16
acl localnet src 127.0.0.1

# SSL ports
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443
acl Safe_ports port 21
acl Safe_ports port 1025-65535
acl CONNECT method CONNECT

# Deny requests to unsafe ports
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow only from localnet (AWS VPCs, internal networks)
http_access allow localnet

# Deny all other access
http_access deny all

# Logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Performance settings
cache_mem 64 MB
maximum_object_size_in_memory 512 KB
maximum_object_size 100 MB
cache_replacement_policy lru
memory_replacement_policy lru

# DNS settings
dns_v4_first on

# Hide proxy info from downstream
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all

# Timeouts
connect_timeout 60 seconds
read_timeout 300 seconds
request_timeout 300 seconds

# Coredump settings
coredump_dir /var/spool/squid

